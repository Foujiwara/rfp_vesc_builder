name: VESC Firmware Builder – Stable Auto

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone VESC
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install SDK
        run: |
          cd bldc
          make arm_sdk_install

      # ✅ Injection AUTO universelle (root + tous sous-dossiers existants)
      - name: Inject hwconf (auto universal)
        run: |
          find custom_hwconf -type f \( -name "hw_*.h" -o -name "hw_*.c" \) | while read FILE; do
            NAME=$(basename "$FILE")

            # root (toujours nécessaire)
            cp "$FILE" bldc/hwconf/

            # duplication dans TOUS les sous-dossiers existants
            find bldc/hwconf -type d | while read DIR; do
              cp "$FILE" "$DIR/" 2>/dev/null || true
            done
          done

      # ✅ Patch HW_NAME
      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find bldc/hwconf -name "hw_*.h" | while read FILE; do
            sed -i 's/\r$//' "$FILE"
            grep -q "$FW_NAME_SUFFIX" "$FILE" && continue
            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$FILE"
          done

      # 🚀 BUILD robuste
      - name: Build
        run: |
          set +e

          BUILD_MODE="all"
          SINGLE_MODEL="C350_V3"

          BUILD_NO_LIMITS="yes"
          PREFIX_RFP="yes"

          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            echo "==== $TARGET ===="

            cd bldc
            if make -n "$TARGET" >/dev/null 2>&1; then
              if make "$TARGET"; then
                echo "OK $TARGET"
              else
                echo "FAILED $TARGET"
                cd ..
                return
              fi
            else
              echo "SKIP $TARGET"
              cd ..
              return
            fi
            cd ..

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            SUFFIX=""
            [ -n "$VARIANT" ] && SUFFIX="_NO_LIMITS"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            cp "bldc/build/${MODEL}${VARIANT}/${MODEL}${VARIANT}.bin" \
              "archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${MODEL}${SUFFIX}_${VERSION}.bin"
          }

          if [ "$BUILD_MODE" = "single" ]; then
            hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}.h" | head -n1)

            MODEL_DIR=$(basename "$(dirname "$hwfile")")
            BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

            build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" ""
            [ "$BUILD_NO_LIMITS" = "yes" ] && \
              build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"

          else
            find custom_hwconf -name "hw_*.h" | while read hwfile; do
              MODEL=$(basename "$hwfile" .h)
              MODEL=${MODEL#hw_}

              MODEL_DIR=$(basename "$(dirname "$hwfile")")
              BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

              build_one "$MODEL" "$BRAND_DIR" "$MODEL_DIR" ""
              [ "$BUILD_NO_LIMITS" = "yes" ] && \
                build_one "$MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"
            done
          fi

      # 📦 Clone archive
      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      # 🧠 Historique
      - name: Prepare archive
        run: |
          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL="${FILE#archive/}"
            DEST="deploy/$REL"
            DIR=$(dirname "$DEST")

            mkdir -p "$DIR"

            if [ -f "$DEST" ]; then
              mkdir -p "$DIR/history/$DATE"
              mv "$DEST" "$DIR/history/$DATE/$NAME"
            fi

            cp "$FILE" "$DEST"
          done

      # 🚀 Push
      - name: Push
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git
