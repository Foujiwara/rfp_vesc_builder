name: VESC Firmware Builder – Final Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone VESC firmware
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install VESC SDK
        run: |
          cd bldc
          make arm_sdk_install

      - name: Inject hwconf
        run: |
          cp -r custom_hwconf/* bldc/hwconf/ 2>/dev/null || true

          find custom_hwconf -name "hw_*.h" -o -name "hw_*.c" \
            -exec cp {} bldc/hwconf/ \;

      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find custom_hwconf -name "hw_*.h" | while read SRC; do
            NAME=$(basename "$SRC")
            TARGET=$(find bldc/hwconf -name "$NAME" | head -n1)

            [ -z "$TARGET" ] && continue

            sed -i 's/\r$//' "$TARGET"
            grep -q "$FW_NAME_SUFFIX" "$TARGET" && continue

            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$TARGET"
          done

      - name: Build firmware
        run: |
          set -e

          BUILD_MODE="single"
          SINGLE_MODEL="go_foc_k900"

          BUILD_NO_LIMITS="yes"
          PREFIX_RFP="yes"

          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            echo "------------------------------"
            echo "Building $TARGET"
            echo "------------------------------"

            cd bldc
            if make -n "$TARGET" >/dev/null 2>&1; then
              make "$TARGET"
            else
              echo "ERROR: Target introuvable → $TARGET"
              cd ..
              return 1
            fi
            cd ..

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            SUFFIX=""
            [ -n "$VARIANT" ] && SUFFIX="_NO_LIMITS"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            BIN_PATH="bldc/build/${MODEL}${VARIANT}/${MODEL}${VARIANT}.bin"

            if [ ! -f "$BIN_PATH" ]; then
              BIN_PATH="bldc/build/${MODEL}/${MODEL}.bin"
            fi

            if [ -f "$BIN_PATH" ]; then
              cp "$BIN_PATH" \
                "archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${MODEL}${SUFFIX}_${VERSION}.bin"
            else
              echo "ERROR: BIN not found for $MODEL"
            fi
          }

          if [ "$BUILD_MODE" = "single" ]; then
            echo ">>> SINGLE BUILD MODE: $SINGLE_MODEL"

            hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}*.h" | head -n1)

            if [ -z "$hwfile" ]; then
              echo "ERROR: Target introuvable → $SINGLE_MODEL"
              exit 1
            fi

            MODEL_TECH=$(basename "$hwfile" .h)
            MODEL_TECH=${MODEL_TECH#hw_}

            MODEL_DIR=$(basename "$(dirname "$hwfile")")
            BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

            echo "Resolved: $MODEL_TECH"
            echo "Path: $BRAND_DIR / $MODEL_DIR"

            build_one "$MODEL_TECH" "$BRAND_DIR" "$MODEL_DIR" ""

            if [ "$BUILD_NO_LIMITS" = "yes" ]; then
              build_one "$MODEL_TECH" "$BRAND_DIR" "$MODEL_DIR" "_no_limits" || true
            fi

            exit 0
          fi

      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      - name: Prepare archive
        run: |
          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL="${FILE#archive/}"

            DEST="deploy/$REL"
            DIR=$(dirname "$DEST")

            mkdir -p "$DIR"

            if [ -f "$DEST" ]; then
              mkdir -p "$DIR/history/$DATE"
              mv "$DEST" "$DIR/history/$DATE/$NAME"
            fi

            cp "$FILE" "$DEST"
          done

      - name: Push
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git
