name: VESC Firmware Builder – Autonomous

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone VESC
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install SDK
        run: |
          cd bldc
          make arm_sdk_install

      # ✅ Injection propre
      - name: Inject hwconf
        run: |
          cp -r custom_hwconf/* bldc/hwconf/ 2>/dev/null || true
          find custom_hwconf -name "hw_*.h" -o -name "hw_*.c" \
            -exec cp {} bldc/hwconf/ \;

      # ✅ Patch HW_NAME
      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find custom_hwconf -name "hw_*.h" | while read SRC; do
            NAME=$(basename "$SRC")
            TARGET=$(find bldc/hwconf -name "$NAME" | head -n1)

            [ -z "$TARGET" ] && continue

            sed -i 's/\r$//' "$TARGET"
            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$TARGET"
          done

      # 🔥 CRÉATION DES TARGETS AUTOMATIQUES
      - name: Generate Makefile targets
        run: |
          cd bldc

          echo "" >> Makefile
          echo "# ==== AUTO TARGETS ====" >> Makefile

          find ../custom_hwconf -name "hw_*.h" | while read FILE; do
            MODEL=$(basename "$FILE" .h)
            MODEL=${MODEL#hw_}

            echo "" >> Makefile

            # NORMAL
            echo "fw_${MODEL}:" >> Makefile
            echo "	@echo \"********* BUILD: ${MODEL} **********\"" >> Makefile
            echo "	\$(MAKE) fw_${MODEL}_vescfw" >> Makefile

            # NO LIMITS
            echo "" >> Makefile
            echo "fw_${MODEL}_no_limits:" >> Makefile
            echo "	@echo \"********* BUILD: ${MODEL} NO LIMITS **********\"" >> Makefile
            echo "	\$(MAKE) fw_${MODEL}_vescfw NO_LIMITS=1" >> Makefile

          done

      # 🚀 BUILD
      - name: Build firmware
        run: |
          set +e

          PREFIX_RFP="yes"
          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            echo "==== $TARGET ===="

            cd bldc
            make "$TARGET"
            cd ..

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            SUFFIX=""
            [ -n "$VARIANT" ] && SUFFIX="_NO_LIMITS"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            BIN=$(find bldc/build -name "${MODEL}*.bin" | head -n1)

            [ -z "$BIN" ] && return

            cp "$BIN" \
              "archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${MODEL}${SUFFIX}_${VERSION}.bin"
          }

          find custom_hwconf -name "hw_*.h" | while read hwfile; do
            MODEL=$(basename "$hwfile" .h)
            MODEL=${MODEL#hw_}

            MODEL_DIR=$(basename "$(dirname "$hwfile")")
            BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

            build_one "$MODEL" "$BRAND_DIR" "$MODEL_DIR" ""
            build_one "$MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"
          done

      # 📦 Archive repo
      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      - name: Prepare archive
        run: |
          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL=$(echo "$FILE" | cut -d'/' -f3-)

            DEST="deploy/$REL"
            DIR=$(dirname "$DEST")

            mkdir -p "$DIR"

            if [ -f "$DEST" ]; then
              mkdir -p "$DIR/history/$DATE"
              mv "$DEST" "$DIR/history/$DATE/$NAME"
            fi

            cp "$FILE" "$DEST"
          done

      - name: Push
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git
