name: VESC Firmware Builder – Multi HW Archive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone VESC
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0 rsync

      - name: Install SDK
        run: |
          cd bldc
          make arm_sdk_install

      - name: Inject custom hwconf
        run: |
          rsync -av custom_hwconf/ bldc/hwconf/

      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find custom_hwconf -name "hw_*.h" | while read SRC_FILE; do
            REL_PATH="${SRC_FILE#custom_hwconf/}"
            TARGET_FILE="bldc/hwconf/$REL_PATH"

            [ ! -f "$TARGET_FILE" ] && continue

            sed -i 's/\r$//' "$TARGET_FILE"
            grep -q "$FW_NAME_SUFFIX" "$TARGET_FILE" && continue

            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$TARGET_FILE"
          done

      - name: Build
        run: |
          set -e

          BUILD_MODE="single"
          SINGLE_MODEL="C350_V3"

          BUILD_NO_LIMITS="yes"
          PREFIX_RFP="yes"

          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            echo "Building $TARGET"

            cd bldc

            if make -n "$TARGET" >/dev/null 2>&1; then
              make "$TARGET"
            else
              echo "Target $TARGET does not exist, skipping."
              cd ..
              return
            fi

            cd ..

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            SUFFIX=""
            [ -n "$VARIANT" ] && SUFFIX="_NO_LIMITS"

            mkdir -p archive/$TAG/$BRAND/$MODEL_DIR

            cp bldc/build/${MODEL}${VARIANT}/${MODEL}${VARIANT}.bin \
               archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${MODEL}${SUFFIX}_${VERSION}.bin
          }

          hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}.h" | head -n1)
          [ -z "$hwfile" ] && echo "HW not found" && exit 1

          MODEL_DIR=$(basename "$(dirname "$hwfile")")
          BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

          build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" ""

          [ "$BUILD_NO_LIMITS" = "yes" ] && \
            build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"

      - name: Push
        uses: peaceiris/actions-gh-pages@v3
        with:
          external_repository: Foujiwara/rfp_fw_archive
          publish_branch: main
          publish_dir: ./archive
          personal_token: ${{ secrets.ARCHIVE_TOKEN }}
          enable_jekyll: false
