name: VESC Firmware Builder – Multi HW Archive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone VESC
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install SDK
        run: |
          cd bldc
          make arm_sdk_install

      - name: Inject custom hwconf
        run: |
          find custom_hwconf -type f \( -name "hw_*.c" -o -name "hw_*.h" \) \
            -exec cp {} bldc/hwconf/ \;

      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find bldc/hwconf -maxdepth 1 -name "hw_*.h" | while read FILE; do
            sed -i 's/\r$//' "$FILE"
            grep -q "$FW_NAME_SUFFIX" "$FILE" && continue
            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$FILE"
          done

      - name: Build
        run: |
          set -e

          BUILD_MODE="single"
          SINGLE_MODEL="C350_V3"

          BUILD_NO_LIMITS="yes"
          PREFIX_RFP="yes"

          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            cd bldc
            if make -n "$TARGET" >/dev/null 2>&1; then
              make "$TARGET"
            else
              cd ..
              return
            fi
            cd ..

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            SUFFIX=""
            [ -n "$VARIANT" ] && SUFFIX="_NO_LIMITS"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            cp "bldc/build/${MODEL}${VARIANT}/${MODEL}${VARIANT}.bin" \
               "archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${MODEL}${SUFFIX}_${VERSION}.bin"
          }

          hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}.h" | head -n1)

          MODEL_DIR=$(basename "$(dirname "$hwfile")")
          BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

          build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" ""

          [ "$BUILD_NO_LIMITS" = "yes" ] && \
            build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"

      # 🔥 CLONE DU REPO ARCHIVE
      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      # ✅ déplacement réel
      - name: Prepare archive (move old versions)
        run: |
          set -e

          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL_PATH="${FILE#archive/}"
            DEST_DIR="deploy/$(dirname "$REL_PATH")"

            mkdir -p "$DEST_DIR/history/$DATE"

            # déplacer ancien fichier existant
            if [ -f "$DEST_DIR/$NAME" ]; then
              mv "$DEST_DIR/$NAME" "$DEST_DIR/history/$DATE/$NAME"
            fi

            # copier nouveau
            mkdir -p "$DEST_DIR"
            cp "$FILE" "$DEST_DIR/$NAME"
          done

      - name: Push to archive
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update firmware $(date)" || echo "No changes"
          git push
