name: VESC Firmware Builder – Multi HW Archive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone VESC firmware
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install VESC SDK
        run: |
          cd bldc
          make arm_sdk_install

      # 🔥 Injection intelligente (compatible tous layouts)
      - name: Inject custom hwconf
        run: |
          find custom_hwconf -type f \( -name "hw_*.h" -o -name "hw_*.c" \) | while read FILE; do
            NAME=$(basename "$FILE")
            MATCH=$(find bldc/hwconf -name "$NAME" | head -n1)

            if [ -n "$MATCH" ]; then
              cp "$FILE" "$MATCH"
            else
              cp "$FILE" bldc/hwconf/
            fi
          done

      # 🔧 Patch HW_NAME
      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find custom_hwconf -name "hw_*.h" | while read SRC; do
            NAME=$(basename "$SRC")
            TARGET=$(find bldc/hwconf -name "$NAME" | head -n1)

            [ -z "$TARGET" ] && continue

            sed -i 's/\r$//' "$TARGET"
            grep -q "$FW_NAME_SUFFIX" "$TARGET" && continue

            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$TARGET"
          done

      # 🚀 BUILD
      - name: Build firmware
        run: |
          set +e

          BUILD_MODE="all"
          SINGLE_MODEL="C350_V3"

          VERSION="V6.06"
          TAG="release_6_06"
          PREFIX_RFP="yes"

          mkdir -p archive/$TAG

          cd bldc
          TARGETS=$(make help | grep fw_ | awk '{print $1}')
          cd ..

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"

            PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && PREFIX="RFP_"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            MATCHED=""
            for T in $TARGETS; do
              if echo "$T" | grep -qi "$MODEL"; then
                MATCHED="$MATCHED $T"
              fi
            done

            for TARGET in $MATCHED; do
              echo "BUILD → $TARGET"

              cd bldc
              if make "$TARGET"; then
                echo "OK $TARGET"
              else
                echo "FAILED $TARGET"
                cd ..
                continue
              fi
              cd ..

              BIN=$(find bldc/build -name "*.bin" -newer bldc/build | head -n1)
              [ -z "$BIN" ] && continue

              NAME=$(basename "$TARGET" | sed 's/fw_//')

              cp "$BIN" \
                "archive/$TAG/$BRAND/$MODEL_DIR/${PREFIX}${NAME}_${VERSION}.bin"
            done
          }

          if [ "$BUILD_MODE" = "single" ]; then
            hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}.h" | head -n1)

            MODEL_DIR=$(basename "$(dirname "$hwfile")")
            BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

            build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR"

          else
            find custom_hwconf -name "hw_*.h" | while read hwfile; do
              MODEL=$(basename "$hwfile" .h)
              MODEL=${MODEL#hw_}

              MODEL_DIR=$(basename "$(dirname "$hwfile")")
              BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

              build_one "$MODEL" "$BRAND_DIR" "$MODEL_DIR"
            done
          fi

      # 📦 Clone archive repo
      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      # 🧠 Gestion historique
      - name: Prepare archive
        run: |
          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL="${FILE#archive/}"
            DEST="deploy/$REL"
            DIR=$(dirname "$DEST")

            mkdir -p "$DIR"

            if [ -f "$DEST" ]; then
              mkdir -p "$DIR/history/$DATE"
              mv "$DEST" "$DIR/history/$DATE/$NAME"
            fi

            cp "$FILE" "$DEST"
          done

      # 🚀 PUSH
      - name: Push to archive repo
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git
