name: VESC Firmware Builder – Stable Clean

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone VESC
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential git make wget libgl-dev libxcb-xinerama0

      - name: Install SDK
        run: |
          cd bldc
          make arm_sdk_install

      # ✅ Injection EXACTE (comme ton code d'origine)
      - name: Inject hwconf
        run: |
          find custom_hwconf -type f \( -name "hw_*.c" -o -name "hw_*.h" \) \
            -exec cp {} bldc/hwconf/ \;

      # ✅ Patch uniquement tes fichiers
      - name: Patch HW_NAME
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          find custom_hwconf -name "hw_*.h" | while read SRC; do
            NAME=$(basename "$SRC")
            TARGET="bldc/hwconf/$NAME"

            [ ! -f "$TARGET" ] && continue

            sed -i 's/\r$//' "$TARGET"
            grep -q "$FW_NAME_SUFFIX" "$TARGET" && continue

            sed -i -E '/#define[[:space:]]+HW_NAME/ s|"([^"]*)"|"\1 '"$FW_NAME_SUFFIX"'"|' "$TARGET"
          done

      # 🚀 BUILD (identique origine + safe)
      - name: Build firmware
        run: |
          set -e

          BUILD_MODE="all"
          SINGLE_MODEL="C350_V3"

          BUILD_NO_LIMITS="yes"
          PREFIX_RFP="yes"

          VERSION="V6.06"
          TAG="release_6_06"

          mkdir -p archive/$TAG

          build_one() {
            MODEL="$1"
            BRAND="$2"
            MODEL_DIR="$3"
            VARIANT="$4"

            TARGET="fw_${MODEL}${VARIANT}"

            echo "------------------------------"
            echo "Building $TARGET"
            echo "------------------------------"

            cd bldc
            if make -n "$TARGET" >/dev/null 2>&1; then
              make "$TARGET"
            else
              echo "Target $TARGET does not exist, skipping."
              cd ..
              return
            fi
            cd ..

            NAME_PREFIX=""
            [ "$PREFIX_RFP" = "yes" ] && NAME_PREFIX="RFP_"

            VARIANT_NAME=""
            [ -n "$VARIANT" ] && VARIANT_NAME="_NO_LIMITS"

            mkdir -p "archive/$TAG/$BRAND/$MODEL_DIR"

            cp "bldc/build/${MODEL}${VARIANT}/${MODEL}${VARIANT}.bin" \
               "archive/$TAG/$BRAND/$MODEL_DIR/${NAME_PREFIX}${MODEL}${VARIANT_NAME}_${VERSION}.bin"
          }

          if [ "$BUILD_MODE" = "single" ]; then
            echo ">>> SINGLE BUILD MODE: $SINGLE_MODEL"

            hwfile=$(find custom_hwconf -name "hw_${SINGLE_MODEL}.h" | head -n1)
            [ -z "$hwfile" ] && echo "ERROR: hw_${SINGLE_MODEL}.h not found" && exit 1

            MODEL_DIR=$(basename "$(dirname "$hwfile")")
            BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

            build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" ""

            [ "$BUILD_NO_LIMITS" = "yes" ] && \
              build_one "$SINGLE_MODEL" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"

          else
            echo ">>> FULL BUILD MODE"

            find custom_hwconf -name "hw_*.h" | while read hwfile; do
              MODEL_TECH=$(basename "$hwfile" .h)
              MODEL_TECH=${MODEL_TECH#hw_}

              MODEL_DIR=$(basename "$(dirname "$hwfile")")
              BRAND_DIR=$(basename "$(dirname "$(dirname "$hwfile")")")

              build_one "$MODEL_TECH" "$BRAND_DIR" "$MODEL_DIR" ""

              [ "$BUILD_NO_LIMITS" = "yes" ] && \
                build_one "$MODEL_TECH" "$BRAND_DIR" "$MODEL_DIR" "_no_limits"
            done
          fi

      # 📦 Archive
      - name: Clone archive repo
        run: |
          git clone https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git deploy || mkdir deploy

      - name: Prepare archive
        run: |
          DATE=$(date +%Y%m%d_%H%M)

          find archive -name "*.bin" | while read FILE; do
            NAME=$(basename "$FILE")
            REL="${FILE#archive/}"

            DEST="deploy/$REL"
            DIR=$(dirname "$DEST")

            mkdir -p "$DIR"

            if [ -f "$DEST" ]; then
              mkdir -p "$DIR/history/$DATE"
              mv "$DEST" "$DIR/history/$DATE/$NAME"
            fi

            cp "$FILE" "$DEST"
          done

      - name: Push
        run: |
          cd deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update $(date)" || echo "No changes"
          git push https://x-access-token:${{ secrets.ARCHIVE_TOKEN }}@github.com/Foujiwara/rfp_fw_archive.git
