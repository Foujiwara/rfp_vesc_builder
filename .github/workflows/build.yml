name: VESC Firmware Builder – Multi HW Archive

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone official VESC firmware
        run: |
          git clone --depth 1 --branch release_6_06 https://github.com/vedderb/bldc.git bldc

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            make \
            wget \
            libgl-dev \
            libxcb-xinerama0

      - name: Install VESC ARM SDK (official)
        run: |
          cd bldc
          make arm_sdk_install

      - name: Inject all custom hwconf
        run: |
          find custom_hwconf -type f \( -name "hw_*.c" -o -name "hw_*.h" \) \
            -exec cp {} bldc/hwconf/ \;

      # ✅ PATCH MINIMAL (adapté à ton usage)
      - name: Patch HW_NAME (optional)
        run: |
          FW_NAME_SUFFIX="RFP-Performance"

          if [ -z "$FW_NAME_SUFFIX" ]; then
            echo "Patch disabled"
            exit 0
          fi

          echo "Applying suffix: $FW_NAME_SUFFIX"

          find bldc/hwconf -name "hw_*.h" | while read FILE; do

            # skip si pas de HW_NAME
            grep -q 'HW_NAME' "$FILE" || continue

            # skip si déjà patché
            grep -q "$FW_NAME_SUFFIX" "$FILE" && continue

            echo "→ $FILE"

            # remplace uniquement le contenu entre guillemets
            sed -i -E 's|("([^"]*)")|"\2 '"$FW_NAME_SUFFIX"'"|' "$FILE"

          done
